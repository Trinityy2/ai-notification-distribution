services:

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      REPOSITORY_BACKEND: sqlalchemy
      # Postgres (default) — comment out and set DATABASE_URL in .env for SQLite
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/notifications
      # Write logs to the mounted volume
      LOG_FILE: /app/logs/app.log
      LOG_MAX_BYTES: "10485760"   # 10 MB
      LOG_BACKUP_COUNT: "5"
    volumes:
      - logs:/app/logs           # rotating log files
      - data:/app/data           # SQLite db file (when using aiosqlite backend)
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notifications"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped


# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  logs:          # app log files — survives container restarts
  data:          # SQLite database (unused when REPOSITORY_BACKEND=sqlalchemy)
  postgres_data: # Postgres data directory
