services:

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      REPOSITORY_BACKEND: sqlalchemy
      # SQLite — stored on the mounted data volume so it survives restarts
      DATABASE_URL: sqlite+aiosqlite:////app/data/notifications.db
      # Write logs to the mounted volume
      LOG_FILE: /app/logs/app.log
      LOG_MAX_BYTES: "10485760"   # 10 MB
      LOG_BACKUP_COUNT: "5"
    volumes:
      - logs:/app/logs           # rotating log files
      - data:/app/data           # SQLite db file
    restart: unless-stopped


# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  logs:          # app log files — survives container restarts
  data:          # SQLite database file
